services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist the vector store and processed data outside the image so
      # container rebuilds don't wipe indexed embeddings or require
      # re-ingesting the whole corpus.
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8502:8501"
    environment:
      # Container-to-container DNS name on the default compose network —
      # NOT localhost, since frontend and backend are separate containers.
      - FASTAPI_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy